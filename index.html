ransaction rows into a clear picture of what sells and when.<\u002Fp>\n                  <div class=\"result\">\n                    <span class=\"r\">12k+ rows<\u002Fspan>\n                    <span class=\"r\">68% revenue mapped<\u002Fspan>\n                  <\u002Fdiv>\n                  <span class=\"cta\">View case study <span class=\"arr\">→<\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fa>\n\n              <!-- Instagram -->\n              <a class=\"card b\" href=\"instagram-growth.html\">\n                <div class=\"thumb\">\n                  <svg viewBox=\"0 0 360 168\" preserveAspectRatio=\"xMidYMid slice\" style=\"width:100%;height:100%;display:block;background:#eef6fd\">\n                    <g transform=\"translate(20,18)\">\n                      <defs>\n                        <linearGradient id=\"ig\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                          <stop offset=\"0\" stop-color=\"#0082e5\" stop-opacity=\"0.32\"><\u002Fstop>\n                          <stop offset=\"1\" stop-color=\"#0082e5\" stop-opacity=\"0\"><\u002Fstop>\n                        <\u002FlinearGradient>\n                      <\u002Fdefs>\n                      <polyline points=\"0,108 60,96 120,82 180,52 240,40 300,12\" fill=\"none\" stroke=\"#0082e5\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n                      <polygon points=\"0,108 60,96 120,82 180,52 240,40 300,12 300,124 0,124\" fill=\"url(#ig)\"><\u002Fpolygon>\n                      <circle cx=\"300\" cy=\"12\" r=\"5\" fill=\"#0082e5\"><\u002Fcircle>\n                    <\u002Fg>\n                  <\u002Fsvg>\n                <\u002Fdiv>\n                <div class=\"body\">\n                  <p class=\"cat\">Social Media · Volunteer<\u002Fp>\n                  <h3>Growing a University Club's Instagram<\u002Fh3>\n                  <p>Built a content system that nearly tripled followers and the club's reach in 4 months.<\u00
