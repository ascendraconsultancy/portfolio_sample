\n                <p class=\"atr\"><b>Role:<\u002Fb> Data Analyst (self-initiated)<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ③ RESULT -->\n        <section class=\"section t\" id=\"s3\" data-screen-label=\"Section 3 — The Result &amp; What I Learned\">\n          <button class=\"hot t\" data-target=\"s3\" aria-label=\"Hotspot 3: The Result and What I Learned\"><span>3<\u002Fspan><\u002Fbutton>\n          <div class=\"reveal\">\n            <button class=\"x\" data-close=\"\" aria-label=\"Close\">✕<\u002Fbutton>\n            <h4><span class=\"n\">3<\u002Fspan> The Result &amp; What I Learned<\u002Fh4>\n            <p>Share the outcome — with numbers if you can. Then add what you learned or improved along the way.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"section-inner results\">\n            <h2 class=\"h2\">The Result &amp; What I Learned<\u002Fh2>\n\n            <div class=\"figure\">\n              <div class=\"panel\">\n                <p class=\"panel-title\">Sales dashboard <span class=\"tag\">analysis.ipynb<\u002Fspan><\u002Fp>\n                <div class=\"kpis\">\n                  <div class=\"kpi\"><div class=\"k-num\" style=\"color:var(--teal)\">12,480<\u002Fdiv><div class=\"k-cap\">Transactions analysed<\u002Fdiv><\u002Fdiv>\n                  <div class=\"kpi\"><div class=\"k-num\" style=\"color:var(--teal)\">68%<\u002Fdiv><div class=\"k-cap\">Revenue from top 3 categories<\u002Fdiv><\u002Fdiv>\n                  <div class=\"kpi\"><div class=\"k-num\" style=\"color:var(--teal)\">−22%<\u002Fdiv><div class=\"k-cap\">Summer dip identified<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1.15fr 1fr;gap:22px;align-items:end;\">\n                  <div>\n                    <p class=\"label\" style=\"margin-bottom:12px;\">Revenue by category<\u002Fp>\n                    <svg viewBox=\"0 0 420 200
